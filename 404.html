<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found · Lo Studio</title>
<meta name="description" content="This page doesn't exist. Head back to the Lo Studio portfolio." />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#141414" />
<link rel="icon" type="image/svg+xml" href="assets/brand/logomark.svg" />
<link rel="apple-touch-icon" href="assets/brand/logo-mark.png" />
<link rel="stylesheet" href="assets/fonts/fonts.css" />
<link rel="stylesheet" href="assets/styles.css" />
<style>
  .nf-stage { min-height: 100vh; overflow: hidden; padding: 24px; position: relative; display: grid; place-items: center; background: radial-gradient(125% 80% at 50% -16%, #232605 0%, #141414 54%); color: #fff; }
  .nf-veil { position: absolute; inset: 0; z-index: 2; background: radial-gradient(80% 60% at 50% 40%, transparent 40%, rgba(0,0,0,.55) 100%); pointer-events: none; }
  #nfStars { position: absolute; inset: 0; z-index: 0; display: block; }
  .nf-dots { position: absolute; inset: 0; z-index: 0; background-image: radial-gradient(circle at 1px 1px, rgba(217,244,0,.10) 1px, transparent 0); background-size: 30px 30px; -webkit-mask-image: radial-gradient(70% 60% at 50% 42%, #000 0%, transparent 75%); mask-image: radial-gradient(70% 60% at 50% 42%, #000 0%, transparent 75%); pointer-events: none; }
  .nf-404 { position: absolute; left: 50%; top: 40%; transform: translate(-50%,-50%); z-index: 1; font-size: clamp(280px, 44vw, 640px); font-weight: 800; letter-spacing: -.06em; line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,.07); pointer-events: none; user-select: none; }
  .nf-horizon { position: absolute; left: 50%; bottom: -18%; transform: translateX(-50%); z-index: 1; width: 140vw; height: 50vh; background: radial-gradient(55% 100% at 50% 100%, rgba(217,244,0,.10), rgba(217,244,0,.02) 55%, transparent 75%); filter: blur(2px); pointer-events: none; }
  .nf-floor { position: absolute; left: 50%; top: 40%; transform: translate(-50%, 130px); z-index: 1; width: 420px; height: 90px; background: radial-gradient(50% 50% at 50% 50%, rgba(120,150,255,.14), transparent 70%); filter: blur(6px); pointer-events: none; }
  .nf-stage .cube-stage { position: relative; right: auto; top: auto; transform: scale(.82); margin: -28px auto; }
  .nf-inner { position: relative; z-index: 3; text-align: center; display: grid; gap: 18px; justify-items: center; }
  .nf-code { font-family: var(--mono); font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: var(--link); }
  .nf-title { font-size: clamp(52px, 9vw, 130px); font-weight: 800; letter-spacing: -.04em; line-height: 1; color: #fff; }
  .nf-title em { font-family: var(--serif); font-style: italic; font-weight: 400; letter-spacing: 0; color: var(--link); }
  .nf-copy { color: rgba(255,255,255,.62); font-size: 17px; max-width: 46ch; text-wrap: pretty; }
  .nf-hint { font-family: var(--mono); font-size: 12px; letter-spacing: .08em; color: rgba(255,255,255,.34); text-transform: uppercase; }
  .nf-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .nf-actions a { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; text-decoration: none; border-radius: 999px; padding: 13px 24px; transition: transform .15s ease, background .15s ease, border-color .15s ease, color .15s ease; }
  .nf-actions a.primary { background: var(--link); color: var(--link-ink); }
  .nf-actions a.primary:hover { transform: translateY(-2px); }
  .nf-actions a.ghost { color: #fff; border: 1px solid rgba(255,255,255,.22); }
  .nf-actions a.ghost:hover { border-color: var(--link); color: var(--link); }
  .nf-glow { position: absolute; left: 50%; top: 42%; transform: translate(-50%,-50%); width: 760px; height: 760px; z-index: 1; background: radial-gradient(circle, rgba(217,244,0,.14), rgba(217,244,0,.04) 40%, transparent 64%); pointer-events: none; }
  @media (max-width: 1240px){ .nf-stage .cube-stage { display: block; } }
  @media (max-width: 480px){ .nf-stage .cube-stage { width: 260px; height: 260px; } }
</style>
</head>
<body>
<div class="grain"></div>
<main class="nf-stage">
  <canvas id="nfStars"></canvas>
  <div class="nf-dots"></div>
  <div class="nf-404" aria-hidden="true">404</div>
  <div class="nf-horizon"></div>
  <div class="nf-floor"></div>
  <div class="nf-glow"></div>
  <div class="nf-veil"></div>
  <div class="nf-inner">
    <div class="cube-stage" id="cubeStage" data-solve aria-hidden="true">
      <div class="cube-scene">
        <div class="cube" id="rubik"></div>
      </div>
    </div>
    <h1 class="nf-title">Lost, <em>not found.</em></h1>
    <p class="nf-copy">This page doesn't exist — it may have moved, or the link is wrong. The work is still where it should be.</p>
    <div class="nf-actions">
      <a class="primary" href="/">Back to home</a>
    </div>
  </div>
</main>
<script src="assets/cube.js" defer></script>
<script>
(function(){
  const cv = document.getElementById('nfStars'); if (!cv) return;
  const ctx = cv.getContext('2d');
  let W, H, stars;
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function init(){
    W = cv.width = innerWidth; H = cv.height = innerHeight;
    stars = Array.from({length: Math.min(160, W*H/9000)}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.3 + .3, tw: Math.random()*Math.PI*2,
      sp: .0008 + Math.random()*.0025
    }));
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    for (const s of stars){
      const a = .12 + .5*Math.abs(Math.sin(s.tw + t*s.sp));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#e9f1ff';
      ctx.fillRect(s.x, s.y, s.r, s.r);
    }
    if (!reduce) requestAnimationFrame(draw);
  }
  init(); addEventListener('resize', init);
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
